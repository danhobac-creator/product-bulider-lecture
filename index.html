<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>오늘의 행운 번호</h1>
        <div class="number-container"></div>
        <button id="generate-btn">번호 생성</button>
        <div class="dark-mode-container">
            <input type="checkbox" id="dark-mode-toggle">
            <label for="dark-mode-toggle">다크 모드</label>
        </div>

        <hr>

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xdawlzdz" method="POST" id="contact-form">
                <div class="form-group">
                    <label for="email">이메일 주소</label>
                    <input type="email" name="email" id="email" required placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea name="message" id="message" required placeholder="문의 내용을 입력해주세요."></textarea>
                </div>
                <button type="submit" id="submit-btn">보내기</button>
                <p id="form-status"></p>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
